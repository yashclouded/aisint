name: Build macOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Build macOS App with Flet
      run: |
        flet build macos --module-name main_gui --yes

    - name: Zip the app
      run: |
        cd build/macos
        zip -ry aisint-macos.zip aisint.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aisint-macos-app
        path: build/macos/aisint-macos.zip
